<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/contacto.css">
</head>
<body>
    <div class="container">
            
            <div class="nav-links-contacto">
                <a href="../index.html"class="nav-btn-contacto">Inicio</a>
                <a href="../pages/experiencia.html"class="nav-btn-contacto">Experiencia</a>
                <a href="../BrayamChavarro.github.io/pages/proyectos.html"class="nav-btn-contacto">Proyectos</a>
                <a href="../BrayamChavarro.github.io/pages/contacto.html"class="nav-btn-contacto active">Contacto</a>
                
                
            </div>
        </nav>
    <section class="hero container-fluid">
    <div class="container mt-5">
      <div class="contact-container">
        <h2 class="text-center mb-4">Contacto</h2>
        <form id="contactForm" action="https://formsubmit.co/cr59828@gmail.com" method="POST" novalidate>
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://tusitio.com/gracias.html"> <!-- URL opcional de redirección tras enviar -->
          
          <div class="mb-3">
            <input type="text" class="form-control" name="Nombre" id="nombre" placeholder="Nombre" required>
            <div class="invalid-feedback">Solo se permiten letras y espacios.</div>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" name="Apellido" id="apellido" placeholder="Apellido" required>
            <div class="invalid-feedback">Solo se permiten letras y espacios.</div>
          </div>
          <div class="mb-3">
            <input type="email" class="form-control" name="Email" id="email" placeholder="Correo Electrónico" required>
            <div class="invalid-feedback">Introduce un correo válido.</div>
          </div>
          <div class="mb-3">
            <input type="tel" class="form-control" name="Teléfono" id="telefono" placeholder="Teléfono" required>
            <div class="invalid-feedback">Debe contener entre 8 y 15 dígitos numéricos.</div>
          </div>
          <div class="mb-3">
            <select class="form-control" name="Servicio" id="servicio" required>
              <option value="" disabled selected>Servicio de Interés</option>
              <option value="consultoria">Consultoría</option>
              <option value="integracion">Integración</option>
              <option value="capacitacion">Capacitación</option>
              <option value="desarrollo">Desarrollo de Software</option>
            </select>
            <div class="invalid-feedback">Selecciona un servicio.</div>
          </div>
          <div class="mb-3">
            <textarea class="form-control" name="Mensaje" id="mensaje" rows="5" placeholder="Tu Mensaje" required></textarea>
            <div class="invalid-feedback">Debe contener al menos 10 caracteres.</div>
          </div>
          <button type="submit" class="btn btn-danger btn-custom" id="submitButton">Enviar Mensaje</button>
        </form>
    <script src="script.js"></script>
    
</body>
</html>

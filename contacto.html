<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Barra de navegación -->
        <nav class="navbar">
            
            <div class="nav-links-contacto">
                <a href="index.html"class="nav-btn-contacto">Inicio</a>
                <a href="experiencia.html"class="nav-btn-contacto">Experiencia</a>
                <a href="proyectos.html"class="nav-btn-contacto">Proyectos</a>
                <a href="contacto.html"class="nav-btn-contacto active">Contacto</a>
                
            </div>
        </nav>
    <div class="form-container">
        <h2>Contacto</h2>
        <form id="contactForm">
            <label for="name">Nombre: </label>
            <input type="text" id="name" name="name" required>

            <label for="email">Correo: </label>
            <input type="text" id="email" name="email" required>

            <label for="message">Mensaje: </label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Enviar</button>
            <p id="forMessage"></p>
        </form>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
